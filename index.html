    <title>Gourmet Food Questionnaire</title> 

    <link rel="canonical" href="https://devops-95.github.io/yourhomefood.in/" />

    <style>
        body {
            background-image: url('https://images.alphacoders.com/605/605333.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
        }

        h1, p, form {
            background-color: rgba(255, 255, 255, 0.9); 
            padding: 25px;
            border-radius: 15px;
            display: block; 
            width: fit-content;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 { color: #e63946; margin-top: 0; }
        p { font-weight: bold; color: #457b9d; }
    </style>
</head> 
<body> 

<h1>What is your favorite dish in the world?</h1> 

<p>I am building a directory of the most delicious culinary experiences.</p>  

<form name="food_survey" onsubmit="identify(event)">
    What is your favorite food or restaurant?
    <br><br>
    <input name="destination" required="" size="81" type="text" placeholder="e.g. Spicy Ramen, Italian Gelato..."/> 
    <br><br><br> 
    Any recommendations (best ingredients, secret spots, or specific chefs)? 
    <br><br> 
    <textarea cols="81" name="details" required="" rows="10"></textarea> 
    <br><br> 
    Name: <input name="fullname" required="" size="75" type="text"/> 
    <br><br> 
    Email: <input name="email" required="" size="75" type="email"/> 
    <br><br>
    <input name="submit" type="submit" value="Submit Entry"/>
</form> 

<script type="text/javascript">
  function identify(e) {
    e.preventDefault();
    var form = e.target;
    
    var email = form["email"].value;
    var fullname = form["fullname"].value;
    var destination = form["destination"].value;
    var details = form["details"].value;

    var urlParams = new URLSearchParams(window.location.search);
    
    // Create traits object
    var userTraits = {
      email: email, 
      name: fullname,
      destination: destination,
      details: details,
      utm_source: urlParams.get('utm_source') || 'direct',
      utm_medium: urlParams.get('utm_medium') || 'none',
      utm_campaign: urlParams.get('utm_campaign') || 'none'
    };

    // 1. Identify the user
    analytics.identify(email, userTraits);

    // 2. Track the action
    analytics.track('Food Survey Submitted', userTraits, function() {
        alert("Thanks, " + fullname + "! Your favorite dish has been recorded.");
        // Uncomment the next line if you want to clear the form after submission
        form.reset();
    });
  }
</script>

</body>
